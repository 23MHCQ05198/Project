<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        form {
            max-width: 520px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            animation: slideUp 0.8s ease;
        }

        h3 {
            color: #e84393;
            border-left: 5px solid #e84393;
            padding-left: 10px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #e84393;
            box-shadow: 0 0 8px #f8a5c2;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #ff5e78, #ff6aa5);
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: #e84393;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>

</head>
<body>

<h2>Add Student Marks (Both Semesters)</h2>

<form action="/add" method="post">

    <label>Roll Number:</label>
    <input type="text" name="rollNumber" required>

    <label>Name:</label>
    <input type="text" name="name" required>

    <h3>Semester 1</h3>

    <label>Python:</label>
    <input type="number" name="py">

    <label>Java:</label>
    <input type="number" name="ja">

    <label>C:</label>
    <input type="number" name="c">

    <label>HTML/CSS:</label>
    <input type="number" name="html">

    <h3>Semester 2</h3>

    <label>JavaScript:</label>
    <input type="number" name="js">

    <label>DevOps:</label>
    <input type="number" name="dev">

    <label>CC:</label>
    <input type="number" name="cc">

    <label>CNS:</label>
    <input type="number" name="cns">

    <button type="submit">Save</button>

</form>

<a href="/search">Go to Search</a>

</body>
</html>
