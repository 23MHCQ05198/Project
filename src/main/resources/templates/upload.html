<!DOCTYPE html>
<html>
<head>
    <title>Upload Excel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 350px;
            margin: 120px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 15px 0;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        button {
            background-color: #4facfe;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #007bff;
        }

        .file-label {
            display: block;
            margin-bottom: 10px;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Upload Excel File</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <label class="file-label">Choose Excel File:</label>
        <input type="file" name="file" required />
        
        <button type="submit">Upload</button>
    </form>
</div>

</body>
</html>
